<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT-like UI with Groq</title>
    <style>
      :root {
        --bg: #090b13;
        --panel: rgba(18, 23, 40, 0.92);
        --panel-strong: rgba(17, 23, 44, 0.98);
        --surface: rgba(255, 255, 255, 0.07);
        --surface-strong: rgba(255, 255, 255, 0.12);
        --text: #eef2ff;
        --muted: #94a3c4;
        --border: rgba(255, 255, 255, 0.12);
        --accent: #6c8cff;
        --accent-strong: #4f70f7;
        --radius: 24px;
        --space: 20px;
        --space-sm: 12px;
        --space-xs: 6px;
        color-scheme: dark;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 15px;
        line-height: 1.5;
        color: var(--text);
        background: var(--bg);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top left,
            rgba(87, 112, 255, 0.16),
            transparent 28%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(85, 163, 255, 0.1),
            transparent 22%
          ),
          linear-gradient(180deg, #07090f 0%, #0b101a 100%);
        display: flex;
        justify-content: center;
        padding: calc(var(--space) * 1);
      }

      button,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:focus-visible,
      textarea:focus-visible,
      .history-item:focus-visible {
        outline: 3px solid rgba(108, 140, 255, 0.55);
        outline-offset: 3px;
      }

      .app-shell {
        width: 100%;
        min-height: 100vh;
        display: flex;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        width: 260px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-right: none;
        border-radius: 0;
        box-shadow: 0 28px 70px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(22px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: var(--space-sm);
        z-index: 10;
      }

      .main {
        flex: 1;
        margin-left: 260px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--panel);
        border: 1px solid var(--border);
        border-left: none;
        border-radius: 0;
        box-shadow: 0 28px 70px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(22px);
      }

      .sidebar-header {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: calc(var(--space-sm));
      }

      .sidebar h2 {
        margin: 0;
        font-size: 1.05rem;
        letter-spacing: 0.02em;
        color: var(--text);
      }

      .sidebar p {
        margin: 0;
        color: var(--muted);
        font-size: 0.94rem;
      }

      .new-chat-btn {
        background: linear-gradient(
          135deg,
          var(--accent),
          var(--accent-strong)
        );
        color: #fff;
        border: none;
        padding: 12px 16px;
        border-radius: 16px;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          background 0.2s ease;
        font-weight: 700;
        margin-bottom: calc(var(--space-xs));
        box-shadow: 0 14px 32px rgba(79, 112, 255, 0.18);
      }

      .new-chat-btn:hover {
        transform: translateY(-1px);
        background: linear-gradient(135deg, #7a9dff, #6575ff);
      }

      .new-chat-btn:active {
        transform: translateY(0);
      }

      .history-list {
        margin: 0;
        padding: 0;
        list-style: none;
        overflow-y: auto;
        display: grid;
        gap: 12px;
        flex: 1;
      }

      .history-item {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 14px;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          background 0.2s ease,
          border-color 0.2s ease;
        display: grid;
        gap: 6px;
      }

      .history-item:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateY(-1px);
      }

      .history-item.active {
        background: rgba(108, 140, 255, 0.14);
        border-color: rgba(108, 140, 255, 0.35);
      }

      .history-item-title {
        margin: 0;
        font-size: 0.96rem;
        font-weight: 700;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .history-item-meta {
        margin: 0;
        font-size: 0.82rem;
        color: var(--muted);
      }

      .main {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        align-items: center;
      }

      .chat-header {
        width: 100%;
        max-width: 780px;
        padding: var(--space-sm);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .chat-title {
        margin: 0;
        color: var(--text);
        font-size: 1.25rem;
        letter-spacing: -0.03em;
      }

      .chat-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
        max-width: 520px;
      }

      .status-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 0.94rem;
        white-space: nowrap;
      }

      .loader {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.14);
        border-top-color: #7f97ff;
        animation: spin 0.95s linear infinite;
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .loader.active {
        opacity: 1;
      }

      .chat-panel {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        width: 100%;
        max-width: 780px;
      }

      .chat-messages {
        flex: 1;
        overflow-y: scroll;
        padding: var(--space-sm);
        display: flex;
        flex-direction: column;
        gap: 10px;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.18) transparent;
        background: rgba(255, 255, 255, 0.02);
      }

      .chat-messages::before {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      .chat-messages::-webkit-scrollbar {
        width: 10px;
      }

      .chat-messages::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.16);
        border-radius: 999px;
      }

      .message {
        display: flex;
        max-width: 100%;
        gap: 12px;
        animation: messageIn 0.28s ease forwards;
      }

      .message.assistant {
        justify-content: flex-start;
      }

      .message.user {
        justify-content: flex-end;
      }

      .message-bubble {
        padding: 12px 14px;
        border-radius: 22px;
        max-width: 62%;
        position: relative;
        line-height: 1.55;
        font-size: 0.92rem;
        box-shadow: 0 16px 38px rgba(0, 0, 0, 0.14);
        transition:
          transform 0.2s ease,
          background 0.2s ease;
        overflow-wrap: anywhere;
      }

      .message.assistant .message-bubble {
        background: rgba(10, 16, 33, 0.94);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .message.user .message-bubble {
        background: linear-gradient(135deg, #4f70f7, #3c55e4);
        color: #fff;
      }

      .message.user .message-bubble:hover,
      .message.assistant .message-bubble:hover {
        transform: translateY(-2px);
      }

      .typing .message-bubble {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        min-width: 110px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .typing-dots {
        display: inline-flex;
        gap: 8px;
      }

      .typing-dots span {
        width: 10px;
        height: 10px;
        background: rgba(255, 255, 255, 0.8);
        border-radius: 999px;
        opacity: 0.45;
        animation: blink 1.2s infinite ease-in-out;
      }

      .typing-dots span:nth-child(2) {
        animation-delay: 0.12s;
      }

      .typing-dots span:nth-child(3) {
        animation-delay: 0.24s;
      }

      .chat-input {
        position: sticky;
        bottom: 0;
        z-index: 2;
        width: 100%;
        max-width: 780px;
        margin: 0 auto;
        padding: calc(var(--space-sm) - 4px);
        background: rgba(10, 14, 27, 0.96);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
      }

      .chat-input textarea {
        width: 100%;
        min-height: 46px;
        max-height: 190px;
        resize: none;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        font-size: 0.92rem;
        line-height: 1.5;
        outline: none;
        overflow-y: hidden;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .chat-input textarea:focus {
        border-color: rgba(108, 140, 255, 0.65);
        box-shadow: 0 0 0 4px rgba(108, 140, 255, 0.14);
      }

      .chat-input button {
        min-width: 100px;
        border: none;
        border-radius: 16px;
        padding: 0 18px;
        background: linear-gradient(
          135deg,
          var(--accent),
          var(--accent-strong)
        );
        color: #fff;
        font-size: 0.92rem;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          opacity 0.2s ease;
        box-shadow: 0 14px 32px rgba(79, 112, 255, 0.2);
        height: 44px;
      }

      .chat-input button:hover {
        transform: translateY(-1px);
      }

      .chat-input button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        box-shadow: none;
      }

      @media (max-width: 980px) {
        .app-shell {
          grid-template-columns: 1fr;
          min-height: auto;
        }

        .sidebar {
          order: 2;
          min-height: 320px;
        }

        .main {
          order: 1;
        }
      }

      @media (max-width: 720px) {
        body {
          padding: 10px;
        }

        .sidebar,
        .main {
          border-radius: 20px;
        }

        .chat-header,
        .chat-input,
        .sidebar {
          padding: 14px;
        }

        .chat-title {
          font-size: 1.15rem;
        }

        .chat-input {
          grid-template-columns: 1fr;
        }

        .chat-input button {
          width: 100%;
        }
      }

      @keyframes messageIn {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes blink {
        0%,
        80%,
        100% {
          opacity: 0.35;
          transform: scale(1);
        }
        40% {
          opacity: 1;
          transform: scale(1.15);
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div>
            <h2>Chat History</h2>
            <p>Saved conversations appear here for quick access.</p>
          </div>
        </div>
        <button
          class="new-chat-btn"
          id="new-chat-btn"
          aria-label="Start a new chat"
        >
          + New chat
        </button>
        <ul class="history-list" id="history-list"></ul>
      </aside>
      <section class="main">
        <header class="chat-header">
          <div>
            <h1 class="chat-title">Groq Chat</h1>
            <p class="chat-subtitle">
              A modern conversational UI with saved chat history and polished
              messaging.
            </p>
          </div>
          <div class="status-bar">
            <span id="status">Ready to chat</span>
            <span id="loader" class="loader"></span>
          </div>
        </header>
        <div class="chat-panel">
          <div class="chat-messages" id="chat-messages"></div>
          <div class="chat-input">
            <textarea
              id="message-input"
              aria-label="Message input"
              placeholder="Type your message here..."
              rows="1"
            ></textarea>
            <button id="send-btn">Send</button>
          </div>
        </div>
      </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="chat.js"></script>
  </body>
</html>
